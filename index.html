<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game Hub · Discord Activity</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
if (typeof MessageChannel === 'undefined') {
  window.MessageChannel = class {
    constructor() {
      this.port1 = { postMessage(){}, onmessage:null };
      this.port2 = { postMessage(){}, onmessage:null };
    }
  };
}
</script>
<style>
/* ═══════════════════════════════
   VARIABLES & RESET
═══════════════════════════════ */
:root {
  --bg:         #0d0e1c;
  --surface:    #161829;
  --card-bg:    #1e2040;
  --border:     rgba(255,255,255,0.08);
  --accent:     #5865F2;
  --accent2:    #a5b4fc;
  --uno-red:    #e8302c;
  --uno-blue:   #1a73e8;
  --uno-yellow: #f9c023;
  --uno-green:  #2db552;
  --tod-purple: #7c3aed;
  --tod-pink:   #ec4899;
  --text:       #e2e4f0;
  --muted:      #6b7280;
  --timer-warn: #f59e0b;
  --timer-crit: #ef4444;
  --ai-color:   #818cf8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  font-family:'Nunito',sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7;}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(88,101,242,.13) 0%,transparent 70%),
    radial-gradient(circle at 15% 85%,rgba(124,58,237,.07) 0%,transparent 40%),
    radial-gradient(circle at 85% 15%,rgba(236,72,153,.05) 0%,transparent 40%);
}
.screen,.toast,.modal-overlay{position:relative;z-index:2;}

/* ═══════════════════════════════
   SCREEN MANAGER
═══════════════════════════════ */
.screen{display:none;width:100%;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;align-items:center;}

/* ═══════════════════════════════
   LAUNCHER
═══════════════════════════════ */
#screen-launcher{justify-content:center;padding:40px 20px;gap:32px;}
.launcher-header{text-align:center;animation:fadeDown .6s ease both;}
.discord-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(88,101,242,.18);border:1px solid rgba(88,101,242,.35);
  border-radius:20px;padding:6px 16px;font-size:11px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);margin-bottom:14px;
}
.discord-badge svg{width:15px;height:15px;}
.launcher-header h1{
  font-family:'Fredoka One',cursive;font-size:clamp(2rem,5vw,3.5rem);
  background:linear-gradient(135deg,#a5b4fc,#818cf8,#c084fc);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;margin-bottom:6px;
}
.launcher-header p{color:var(--muted);font-size:14px;font-weight:700;}
.activity-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:18px;width:100%;max-width:720px;animation:fadeUp .7s .2s ease both;
}
.activity-card{
  position:relative;border-radius:20px;padding:26px;cursor:pointer;
  transition:transform .2s,box-shadow .2s;overflow:hidden;border:1px solid transparent;
}
.activity-card:hover{transform:translateY(-4px);}
.activity-card.uno-card{
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  border-color:rgba(232,48,44,.3);box-shadow:0 8px 32px rgba(232,48,44,.2);
}
.activity-card.uno-card:hover{box-shadow:0 16px 48px rgba(232,48,44,.35);border-color:rgba(232,48,44,.6);}
.activity-card.tod-card{
  background:linear-gradient(135deg,#1a0a2e,#2d1b6e,#1a0a2e);
  border-color:rgba(124,58,237,.3);box-shadow:0 8px 32px rgba(124,58,237,.2);
}
.activity-card.tod-card:hover{box-shadow:0 16px 48px rgba(124,58,237,.35);border-color:rgba(124,58,237,.6);}
.card-glow{
  position:absolute;width:200px;height:200px;border-radius:50%;
  top:-60px;right:-60px;filter:blur(60px);opacity:.35;pointer-events:none;
}
.uno-card .card-glow{background:var(--uno-red);}

/* ═══════════════════════════════
   SHARDS SYSTEM
═══════════════════════════════ */
.shard-hud {
  position:fixed;top:70px;right:14px;z-index:90;
  background:rgba(0,0,0,.6);border:1px solid rgba(249,192,35,.3);
  backdrop-filter:blur(12px);border-radius:14px;padding:7px 13px;
  display:flex;align-items:center;gap:7px;
  font-family:'Fredoka One',cursive;font-size:14px;color:var(--uno-yellow);
  box-shadow:0 4px 16px rgba(249,192,35,.15);
  transition:transform .2s;cursor:pointer;user-select:none;
}
.shard-hud:hover{transform:scale(1.05);}
.shard-hud-icon{font-size:16px;animation:shardFloat 3s ease-in-out infinite;}
.shard-reward-pop{
  position:fixed;z-index:500;font-family:'Fredoka One',cursive;font-size:22px;
  color:var(--uno-yellow);text-shadow:0 0 20px rgba(249,192,35,.8);
  pointer-events:none;animation:rewardFloat 1.6s ease forwards;
}
@keyframes rewardFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.4)}}

/* ═══════════════════════════════
   SHOP MODAL
═══════════════════════════════ */
.shop-modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:400;align-items:flex-start;justify-content:center;
  backdrop-filter:blur(10px);overflow-y:auto;padding:24px 12px 60px;
}
.shop-modal-overlay.show{display:flex;}
.shop-box{
  background:var(--surface);border:1px solid rgba(249,192,35,.25);
  border-radius:24px;padding:28px 22px;width:100%;max-width:440px;
  box-shadow:0 24px 80px rgba(0,0,0,.8);animation:cardReveal .35s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;
}
.shop-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.shop-title{font-family:'Fredoka One',cursive;font-size:24px;color:var(--uno-yellow);display:flex;align-items:center;gap:9px;}
.shop-close{background:rgba(255,255,255,.08);border:none;color:#9ca3af;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.shop-close:hover{background:rgba(255,255,255,.15);color:#fff;}
.shop-balance{background:rgba(249,192,35,.1);border:1px solid rgba(249,192,35,.25);border-radius:12px;padding:10px 16px;font-family:'Fredoka One',cursive;font-size:18px;color:var(--uno-yellow);text-align:center;margin-bottom:18px;}
.shop-section-title{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.shop-item{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:14px;padding:14px 12px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;
  position:relative;overflow:hidden;
}
.shop-item:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);transform:translateY(-2px);}
.shop-item.owned{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06);}
.shop-item.equipped{border-color:rgba(88,101,242,.5);background:rgba(88,101,242,.1);box-shadow:0 0 16px rgba(88,101,242,.2);}
.shop-item-icon{font-size:30px;}
.shop-item-name{font-size:12px;font-weight:800;color:#fff;}
.shop-item-desc{font-size:10px;color:var(--muted);font-weight:700;line-height:1.3;}
.shop-item-price{font-family:'Fredoka One',cursive;font-size:13px;color:var(--uno-yellow);display:flex;align-items:center;gap:4px;margin-top:2px;}
.shop-item-badge{position:absolute;top:6px;right:6px;font-size:8px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:6px;}
.badge-owned{background:rgba(34,197,94,.2);color:#4ade80;}
.badge-equipped{background:rgba(88,101,242,.25);color:#a5b4fc;}
.shop-preview{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;margin-top:4px;}
.shop-preview-label{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.card-color-preview{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.card-color-swatch{width:38px;height:56px;border-radius:7px;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:13px;color:rgba(255,255,255,.9);transition:transform .2s;}

/* ═══════════════════════════════
   COMBO DISPLAY
═══════════════════════════════ */
.combo-overlay{
  position:fixed;inset:0;z-index:160;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.combo-overlay.show{opacity:1;}
.combo-banner{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  animation:comboPop .5s cubic-bezier(.34,1.56,.64,1) both;
}
.combo-label{
  font-family:'Fredoka One',cursive;font-size:clamp(36px,9vw,80px);
  background:linear-gradient(135deg,#f9c023,#f43f5e,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;letter-spacing:.02em;filter:drop-shadow(0 0 30px rgba(249,192,35,.6));
}
.combo-sub{font-family:'Fredoka One',cursive;font-size:clamp(14px,3vw,22px);color:#fff;opacity:.85;letter-spacing:.08em;}
@keyframes comboPop{
  0%{transform:scale(0.3) rotate(-8deg);opacity:0;}
  60%{transform:scale(1.15) rotate(2deg);opacity:1;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}

/* ═══════════════════════════════
   COMING SOON (ToD)
═══════════════════════════════ */
.coming-soon-card{
  background:linear-gradient(135deg,#1a0a2e,#2d1b6e,#1a0a2e);
  border:2px dashed rgba(124,58,237,.4);border-radius:20px;
  padding:40px 26px;text-align:center;position:relative;overflow:hidden;
  cursor:default;
}
.coming-soon-glow{
  position:absolute;width:300px;height:300px;border-radius:50%;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(124,58,237,.18) 0%,transparent 70%);
  pointer-events:none;
}
.coming-soon-icon{font-size:52px;margin-bottom:12px;display:block;opacity:.7;}
.coming-soon-title{font-family:'Fredoka One',cursive;font-size:26px;color:#a78bfa;margin-bottom:8px;}
.coming-soon-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);
  border-radius:20px;padding:6px 16px;font-size:12px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:#a78bfa;margin-bottom:12px;
}
.coming-soon-desc{font-size:13px;color:#6b7280;font-weight:700;line-height:1.5;}

/* Music toggle button */
.music-btn{
  position:fixed;bottom:18px;left:14px;z-index:90;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(12px);border-radius:12px;padding:7px 13px;
  display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;
  color:#9ca3af;cursor:pointer;transition:all .2s;user-select:none;
}
.music-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.music-btn.playing{border-color:rgba(88,101,242,.4);color:var(--accent2);}
.music-btn i{font-size:13px;}

/* ═══════════════════════════════
   DEAL ANIMATION SCREEN
═══════════════════════════════ */
#screen-dealing{
  justify-content:center;align-items:center;
  background:var(--bg);z-index:300;
}
.deal-scene{
  display:flex;flex-direction:column;align-items:center;gap:28px;
  width:100%;max-width:420px;padding:40px 20px;
}
.deal-title{
  font-family:'Fredoka One',cursive;font-size:28px;color:#fff;
  text-align:center;animation:fadeDown .4s ease both;
}
.deal-deck-area{
  position:relative;width:80px;height:120px;
  display:flex;align-items:center;justify-content:center;
}
.deal-deck-card{
  position:absolute;width:70px;height:105px;
  background:linear-gradient(145deg,#c0221e,#e8302c);
  border-radius:9px;border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  transition:transform .15s ease,opacity .15s ease;
}
.deal-players-row{
  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  width:100%;
}
.deal-player-slot{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  min-width:68px;
}
.deal-player-avatar{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;color:#fff;
  border:2px solid rgba(255,255,255,.15);
  transition:transform .2s,box-shadow .2s;
}
.deal-player-avatar.receiving{
  transform:scale(1.15);
  box-shadow:0 0 20px rgba(249,192,35,.6);
}
.deal-player-name{font-size:11px;font-weight:800;color:#9ca3af;text-align:center;}
.deal-card-count{
  font-family:'Fredoka One',cursive;font-size:13px;color:var(--uno-yellow);
  min-height:18px;
}
.deal-status{
  font-size:13px;color:var(--muted);font-weight:700;text-align:center;
  min-height:22px;
}
.deal-flying-card{
  position:fixed;z-index:350;pointer-events:none;
  width:50px;height:75px;
  background:linear-gradient(145deg,#c0221e,#e8302c);
  border-radius:7px;border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
  transition:transform .32s cubic-bezier(.4,0,.2,1),top .32s cubic-bezier(.4,0,.2,1),left .32s cubic-bezier(.4,0,.2,1),opacity .2s ease;
}
@keyframes shuffle1{0%{transform:translateX(0) rotate(0)}25%{transform:translateX(-18px) rotate(-5deg)}75%{transform:translateX(18px) rotate(5deg)}100%{transform:translateX(0) rotate(0)}}
@keyframes shuffle2{0%{transform:translateY(0)}50%{transform:translateY(-10px) scale(1.04)}100%{transform:translateY(0)}}
.shuffling .deal-deck-card:nth-child(odd){animation:shuffle1 .22s ease both;}
.shuffling .deal-deck-card:nth-child(even){animation:shuffle2 .22s .06s ease both;}

/* ═══════════════════════════════
   DRAG & DROP
═══════════════════════════════ */
.card-img-wrap.dragging{
  opacity:0.35;
  transform:scale(0.9)!important;
}
.card-img-wrap[draggable="true"]{cursor:grab;}
.card-img-wrap[draggable="true"]:active{cursor:grabbing;}
.drop-zone{
  position:absolute;inset:-18px;border-radius:22px;
  border:3px dashed transparent;
  transition:all .2s;z-index:15;pointer-events:all;
}
.drop-zone.drag-over{
  border-color:rgba(249,192,35,.8);
  background:rgba(249,192,35,.12);
  box-shadow:0 0 30px rgba(249,192,35,.4);
}
.drag-ghost{
  position:fixed;z-index:9999;pointer-events:none;
  width:54px;height:81px;
  border-radius:8px;opacity:.92;
  background:linear-gradient(145deg,rgba(30,32,64,.95),rgba(22,24,41,.95));
  border:2px solid rgba(255,255,255,.3);
  box-shadow:0 12px 40px rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  transform:rotate(-8deg) scale(1.08);
  transition:none;
}
.ai-difficulty-row {
  display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;
}
.diff-btn {
  flex:1;padding:8px 10px;border-radius:10px;border:1px solid var(--border);
  background:rgba(255,255,255,.05);color:#9ca3af;font-family:'Nunito',sans-serif;
  font-size:11px;font-weight:800;cursor:pointer;transition:all .2s;text-align:center;
}
.diff-btn.active{background:rgba(129,140,248,.18);border-color:rgba(129,140,248,.45);color:#a5b4fc;}
.diff-btn:hover{background:rgba(255,255,255,.1);}

/* launcher card preview floaters */
.card-floater{
  position:fixed;pointer-events:none;z-index:0;border-radius:8px;opacity:.18;
  animation:floatCard linear infinite;transform-origin:center;
}
@keyframes floatCard{
  0%{transform:translateY(110vh) rotate(var(--rot-start)) scale(.7);}
  100%{transform:translateY(-120px) rotate(var(--rot-end)) scale(.9);}
}
.tod-card .card-glow{background:var(--tod-purple);}
.card-icon{font-size:50px;margin-bottom:12px;display:block;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));}
.card-icon img{width:54px;height:54px;object-fit:contain;display:block;}
.card-icon .fa-icon-large{font-size:48px;display:block;}
.card-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
.uno-card .card-label{color:var(--uno-red);}
.tod-card .card-label{color:#a78bfa;}
.card-title{font-family:'Fredoka One',cursive;font-size:26px;color:#fff;margin-bottom:6px;}
.card-desc{font-size:12px;color:#9ca3af;line-height:1.5;margin-bottom:16px;font-weight:600;}
.card-meta{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.meta-pill{
  background:rgba(255,255,255,.07);border-radius:20px;
  padding:4px 11px;font-size:11px;font-weight:700;color:#d1d5db;
  display:inline-flex;align-items:center;gap:5px;
}
.meta-pill i{font-size:10px;}
.launch-btn{
  display:inline-flex;align-items:center;gap:8px;padding:11px 22px;
  border-radius:12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.05em;
}
.uno-card .launch-btn{background:linear-gradient(135deg,var(--uno-red),#c0392b);color:#fff;box-shadow:0 4px 16px rgba(232,48,44,.4);}
.uno-card .launch-btn:hover{box-shadow:0 6px 24px rgba(232,48,44,.6);transform:scale(1.02);}
.tod-card .launch-btn{background:linear-gradient(135deg,var(--tod-purple),#6d28d9);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.4);}
.tod-card .launch-btn:hover{box-shadow:0 6px 24px rgba(124,58,237,.6);transform:scale(1.02);}

/* ═══════════════════════════════
   LOBBY BROWSER (new)
═══════════════════════════════ */
#screen-lobby-browser{justify-content:flex-start;padding:0;background:transparent;}
.browser-topbar{
  width:100%;background:rgba(0,0,0,.45);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:11px 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.browser-content{
  width:100%;max-width:600px;padding:20px 16px;display:flex;flex-direction:column;gap:16px;
}
.section-title{
  font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.lobby-cards-grid{display:flex;flex-direction:column;gap:10px;}
.lobby-card-item{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:14px;padding:14px 16px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;
}
.lobby-card-item:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.15);transform:translateX(3px);}
.lobby-card-item.in-progress{border-color:rgba(249,192,35,.25);}
.lobby-card-item.in-progress:hover{border-color:rgba(249,192,35,.5);}
.lci-avatar{
  width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.lci-info{flex:1;min-width:0;}
.lci-name{font-size:14px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lci-meta{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;display:flex;align-items:center;gap:8px;}
.lci-players{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:800;color:#a5b4fc;}
.lci-status{
  font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:8px;flex-shrink:0;
}
.lci-status.waiting{background:rgba(34,197,94,.15);color:#4ade80;}
.lci-status.playing{background:rgba(249,192,35,.15);color:var(--uno-yellow);}
.lci-status.spectate{background:rgba(107,114,128,.15);color:#9ca3af;}
.no-lobbies{
  text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;font-weight:700;
}
.no-lobbies i{font-size:32px;display:block;margin-bottom:10px;opacity:.4;}
.lobby-refresh-btn{
  display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);
  border:1px solid var(--border);color:var(--muted);padding:8px 16px;
  border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;
  font-family:'Nunito',sans-serif;
}
.lobby-refresh-btn:hover{background:rgba(255,255,255,.12);}

/* ═══════════════════════════════
   LOBBY
═══════════════════════════════ */
#screen-lobby{justify-content:center;padding:32px 20px;gap:20px;background:transparent;}
.lobby-header{text-align:center;animation:fadeDown .5s ease both;}
.lobby-header h2{font-family:'Fredoka One',cursive;font-size:2rem;color:#fff;margin-bottom:4px;}
.lobby-header p{color:var(--muted);font-size:13px;font-weight:700;}
.lobby-box{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:20px;padding:24px;width:100%;max-width:420px;
  animation:fadeUp .5s .1s ease both;
}
.lobby-box h3{font-family:'Fredoka One',cursive;font-size:17px;color:#fff;margin-bottom:14px;}
.field-label{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.inp{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;padding:11px 14px;color:#fff;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;outline:none;
  transition:border-color .2s;
}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:rgba(255,255,255,.25);}
.inp.code-inp{letter-spacing:.4em;font-size:22px;text-align:center;font-family:'Fredoka One',cursive;text-transform:uppercase;}
.btn-row{display:flex;gap:10px;margin-top:6px;}
.btn{
  flex:1;padding:11px 16px;border-radius:10px;border:none;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;transition:all .2s;letter-spacing:.04em;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),#4752c4);color:#fff;box-shadow:0 4px 14px rgba(88,101,242,.4);}
.btn-primary:hover{box-shadow:0 6px 20px rgba(88,101,242,.55);transform:scale(1.02);}
.btn-secondary{background:rgba(255,255,255,.08);color:#d1d5db;border:1px solid var(--border);}
.btn-secondary:hover{background:rgba(255,255,255,.13);}
.btn-danger{background:linear-gradient(135deg,var(--uno-red),#c0221e);color:#fff;box-shadow:0 4px 14px rgba(232,48,44,.35);}
.btn-danger:hover{box-shadow:0 6px 20px rgba(232,48,44,.5);transform:scale(1.02);}
.btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 14px rgba(34,197,94,.4);}
.btn-success:hover{box-shadow:0 6px 20px rgba(34,197,94,.5);transform:scale(1.02);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn-ai{background:linear-gradient(135deg,#818cf8,#6366f1);color:#fff;box-shadow:0 4px 14px rgba(129,140,248,.4);}
.btn-ai:hover{box-shadow:0 6px 20px rgba(129,140,248,.6);transform:scale(1.02);}
.room-code-display{
  background:rgba(88,101,242,.12);border:2px solid rgba(88,101,242,.3);
  border-radius:14px;padding:16px;margin:12px 0;text-align:center;
}
.room-code-display .code-big{
  font-family:'Fredoka One',cursive;font-size:42px;letter-spacing:.35em;
  color:#fff;text-shadow:0 0 30px rgba(88,101,242,.8);
}
.room-code-display p{font-size:11px;color:var(--muted);font-weight:700;margin-top:4px;}
.lobby-players{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.lobby-player-item{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.05);border-radius:10px;padding:9px 12px;
  animation:fadeIn .3s ease both;
}
.lp-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;flex-shrink:0;
}
.lp-name{font-size:13px;font-weight:800;flex:1;}
.lp-badge{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:8px;}
.lp-badge.host{background:rgba(249,192,35,.2);color:var(--uno-yellow);}
.lp-badge.you{background:rgba(88,101,242,.2);color:var(--accent2);}
.lp-badge.ai-badge{background:rgba(129,140,248,.2);color:var(--ai-color);}
.lp-badge.spectator-badge{background:rgba(107,114,128,.2);color:#9ca3af;}
.lobby-divider{
  display:flex;align-items:center;gap:10px;color:var(--muted);
  font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin:6px 0;
}
.lobby-divider::before,.lobby-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* House Rules Panel */
.house-rules-panel{
  background:rgba(249,192,35,.06);border:1px solid rgba(249,192,35,.2);
  border-radius:14px;padding:14px 16px;margin-top:8px;
}
.house-rules-title{
  font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--uno-yellow);margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.house-rule-row{
  display:flex;align-items:center;justify-content:space-between;padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.house-rule-row:last-child{border-bottom:none;}
.house-rule-label{font-size:12px;font-weight:700;color:#d1d5db;}
.house-rule-desc{font-size:10px;color:var(--muted);margin-top:1px;}

/* AI Mode toggle row in lobby */
.ai-mode-row{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(129,140,248,.07);border:1px solid rgba(129,140,248,.2);
  border-radius:12px;padding:12px 14px;margin-top:4px;
}
.ai-mode-label{font-size:13px;font-weight:800;color:#a5b4fc;display:flex;align-items:center;gap:7px;}
.ai-mode-label small{font-size:10px;color:var(--muted);font-weight:700;display:block;margin-top:1px;}
.toggle-switch{position:relative;width:42px;height:24px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{
  position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:24px;
  cursor:pointer;transition:background .3s;border:1px solid rgba(255,255,255,.1);
}
.toggle-slider::before{
  content:'';position:absolute;width:18px;height:18px;border-radius:50%;
  background:#fff;top:2px;left:2px;transition:transform .3s;box-shadow:0 2px 4px rgba(0,0,0,.3);
}
.toggle-switch input:checked + .toggle-slider{background:var(--ai-color);border-color:rgba(129,140,248,.4);}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(18px);}

/* ═══════════════════════════════
   GAME TOP BAR
═══════════════════════════════ */
.game-topbar{
  width:100%;background:rgba(0,0,0,.45);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:11px 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.back-btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
  color:#d1d5db;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;
  display:inline-flex;align-items:center;gap:6px;
}
.back-btn:hover{background:rgba(255,255,255,.15);}
.topbar-title{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;display:flex;align-items:center;gap:7px;}
.topbar-meta{font-size:11px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:8px;}

/* ═══════════════════════════════
   TURN TIMER
═══════════════════════════════ */
.turn-timer-wrap{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  border-radius:10px;padding:5px 10px;transition:all .4s;
}
.turn-timer-wrap.warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);}
.turn-timer-wrap.crit{
  background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.45);
  animation:timerPulse .5s ease infinite;
}
.turn-timer-num{
  font-family:'Fredoka One',cursive;font-size:16px;color:#fff;
  min-width:22px;text-align:center;line-height:1;
}
.turn-timer-wrap.warn .turn-timer-num{color:var(--timer-warn);}
.turn-timer-wrap.crit .turn-timer-num{color:var(--timer-crit);}
.turn-timer-ring{width:20px;height:20px;flex-shrink:0;}
.turn-timer-ring circle{
  fill:none;stroke-width:3;stroke-linecap:round;
  transform-origin:50% 50%;transform:rotate(-90deg);
  transition:stroke-dashoffset .9s linear,stroke .4s;
}
.ring-bg{stroke:rgba(255,255,255,.1);}
.ring-fg{stroke:var(--accent2);stroke-dasharray:50.26;stroke-dashoffset:0;}
.turn-timer-wrap.warn .ring-fg{stroke:var(--timer-warn);}
.turn-timer-wrap.crit .ring-fg{stroke:var(--timer-crit);}

/* ═══════════════════════════════
   UNO GAME SCREEN
═══════════════════════════════ */
#screen-uno{padding:0;background:transparent;min-height:100vh;position:relative;overflow:hidden;}
#screen-uno::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(232,48,44,.07) 0%,transparent 70%);
}
#screen-uno > * {position:relative;z-index:2;}
.uno-table{
  width:100%;max-width:900px;margin:0 auto;
  padding:18px 16px 220px;display:flex;flex-direction:column;align-items:center;gap:18px;
}
.players-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;width:100%;animation:fadeDown .4s ease both;}
.player-chip{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:14px;padding:11px 14px;min-width:82px;transition:all .25s;position:relative;
}
.player-chip.active-player{
  border-color:var(--uno-yellow);background:rgba(249,192,35,.09);
  box-shadow:0 0 20px rgba(249,192,35,.22);
}
.player-chip.active-player::before{
  content:'YOUR TURN';position:absolute;top:-9px;
  background:var(--uno-yellow);color:#111;font-size:7px;font-weight:900;
  letter-spacing:.1em;padding:2px 7px;border-radius:8px;
}
.player-chip.other-active-player{
  border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.07);
  box-shadow:0 0 16px rgba(255,255,255,.12);
}
.player-chip.other-active-player::before{
  content:'THEIR TURN';position:absolute;top:-9px;
  background:rgba(255,255,255,.8);color:#111;font-size:7px;font-weight:900;
  letter-spacing:.1em;padding:2px 7px;border-radius:8px;
}
.player-chip.ai-chip{border-color:rgba(129,140,248,.4);}
.player-chip.ai-chip.other-active-player{
  border-color:var(--ai-color);background:rgba(129,140,248,.1);
  box-shadow:0 0 18px rgba(129,140,248,.2);
}
.player-chip.ai-chip.other-active-player::before{content:'AI TURN';background:var(--ai-color);}
.player-chip.spectator-chip{opacity:.5;border-style:dashed;}
.player-avatar{
  width:38px;height:38px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:17px;font-weight:900;
  color:#fff;position:relative;
}
.card-count-badge{
  position:absolute;bottom:-3px;right:-3px;background:#ef4444;
  color:#fff;font-size:9px;font-weight:900;width:17px;height:17px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:2px solid #0d0f1a;
}
.player-name{font-size:11px;font-weight:800;color:#d1d5db;text-align:center;}
.player-score{font-size:10px;color:var(--muted);font-weight:700;}

/* AI thinking chip indicator */
.ai-thinking-chip{
  display:flex;align-items:center;gap:4px;
  background:rgba(129,140,248,.15);border:1px solid rgba(129,140,248,.3);
  border-radius:8px;padding:3px 7px;margin-top:3px;
}
.ai-thinking-chip span{font-size:8px;font-weight:800;color:var(--ai-color);letter-spacing:.06em;text-transform:uppercase;}
.ai-dots span{
  display:inline-block;width:3px;height:3px;border-radius:50%;
  background:var(--ai-color);animation:dotPulse .9s ease infinite;margin:0 1px;
}
.ai-dots span:nth-child(2){animation-delay:.15s;}
.ai-dots span:nth-child(3){animation-delay:.3s;}

/* ── Game arena ── */
.game-arena{
  position:relative;width:240px;height:240px;
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .5s .2s ease both;
}
.arena-ring{position:absolute;inset:0;border-radius:50%;border:2px dashed rgba(255,255,255,.07);animation:spin 20s linear infinite;}
.arena-ring-2{position:absolute;inset:20px;border-radius:50%;border:1px dashed rgba(88,101,242,.18);animation:spin 12s linear infinite reverse;}
.turn-arrows{position:absolute;inset:-10px;border-radius:50%;display:flex;align-items:center;justify-content:center;animation:spin 8s linear infinite;opacity:.55;}
.discard-pile{position:relative;z-index:10;}
.draw-pile-btn{
  position:absolute;right:-72px;top:50%;transform:translateY(-50%);
  cursor:pointer;transition:transform .2s;
}
.draw-pile-btn:hover{transform:translateY(-50%) scale(1.06);}
.draw-pile-inner{text-align:center;}
.draw-pile-label{font-size:10px;color:var(--muted);font-weight:800;margin-top:4px;letter-spacing:.05em;}

/* Draw stack indicator */
.draw-stack-badge{
  position:absolute;top:-10px;right:-10px;background:var(--uno-red);
  color:#fff;font-size:10px;font-weight:900;min-width:22px;height:22px;
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);z-index:20;padding:0 4px;
  animation:popBounce .3s cubic-bezier(.34,1.56,.64,1);
}

/* ── Card styles ── */
.card-img-wrap{
  position:relative;flex-shrink:0;
  transition:transform .2s cubic-bezier(.34,1.4,.64,1),filter .15s ease,box-shadow .2s;
  border-radius:10px;
}
.card-img-wrap img{
  display:block;border-radius:10px;object-fit:cover;
  box-shadow:0 4px 14px rgba(0,0,0,.5);
  user-select:none;-webkit-user-drag:none;pointer-events:none;
  transition:box-shadow .2s;
}
.card-img-wrap.clickable{cursor:pointer;}
.card-img-wrap.clickable:hover{transform:translateY(-14px) scale(1.07) rotate(-2deg);}
.card-img-wrap.selected{
  transform:translateY(-24px) scale(1.12) rotate(-3deg)!important;
  filter:drop-shadow(0 0 14px rgba(255,255,255,.6));
}
.card-img-wrap.selected img{box-shadow:0 14px 36px rgba(0,0,0,.6),0 0 0 3px rgba(255,255,255,.7);}
.card-img-wrap.playable img{box-shadow:0 4px 14px rgba(0,0,0,.5),0 0 0 2px rgba(255,255,255,.4);}
.card-img-wrap.not-playable{opacity:.55;filter:grayscale(.4);}
.card-img-wrap.stacked-selected{
  transform:translateY(-24px) scale(1.12)!important;
  filter:drop-shadow(0 0 10px rgba(249,192,35,.8));
}
.card-img-wrap.stacked-selected img{box-shadow:0 14px 36px rgba(0,0,0,.6),0 0 0 3px rgba(249,192,35,.9);}
.card-css{
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.5);font-family:'Fredoka One',cursive;
  color:#fff;font-size:24px;border:2px solid rgba(255,255,255,.15);
}
.card-css.card-red{background:linear-gradient(145deg,#e8302c,#c0221e);}
.card-css.card-blue{background:linear-gradient(145deg,#1a73e8,#1557b0);}
.card-css.card-green{background:linear-gradient(145deg,#2db552,#1e8a3d);}
.card-css.card-yellow{background:linear-gradient(145deg,#f9c023,#e0a010);}
.card-css.card-black{background:linear-gradient(145deg,#222,#000);}
.card-back-css{
  background:linear-gradient(145deg,#c0221e,#e8302c);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.15);flex-shrink:0;
}
.card-back-logo{
  font-family:'Fredoka One',cursive;font-size:14px;color:rgba(255,255,255,.9);
  background:rgba(0,0,0,.3);border-radius:50%;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  transform:rotate(-15deg);letter-spacing:.02em;
}

/* Enhanced card animations */
@keyframes cardFlyIn{
  0%{transform:translateY(-80px) scale(1.3) rotate(10deg);opacity:0;}
  60%{transform:translateY(6px) scale(.98) rotate(-1deg);opacity:1;}
  80%{transform:translateY(-3px) scale(1.01);}
  100%{transform:translateY(0) scale(1) rotate(0);opacity:1;}
}
@keyframes cardDrawIn{
  0%{transform:translateX(80px) scale(.8) rotate(15deg);opacity:0;}
  100%{transform:translateX(0) scale(1) rotate(0);opacity:1;}
}
@keyframes cardShake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px) rotate(-2deg);}
  40%{transform:translateX(6px) rotate(2deg);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
@keyframes specialFlash{
  0%{filter:brightness(1);}
  30%{filter:brightness(2.5) saturate(2);}
  60%{filter:brightness(1.5);}
  100%{filter:brightness(1);}
}
@keyframes wildPulse{
  0%,100%{box-shadow:0 0 20px rgba(255,255,255,.3);}
  50%{box-shadow:0 0 50px rgba(255,255,255,.8),0 0 100px rgba(255,200,50,.4);}
}
@keyframes skipSpin{
  0%{transform:scale(1) rotate(0);}
  50%{transform:scale(1.2) rotate(180deg);}
  100%{transform:scale(1) rotate(360deg);}
}
@keyframes reversePulse{
  0%{transform:scaleX(1);}
  50%{transform:scaleX(-1);}
  100%{transform:scaleX(1);}
}
@keyframes draw2Pop{
  0%,100%{transform:translateY(0);}
  30%{transform:translateY(-20px) rotate(-5deg);}
  60%{transform:translateY(-15px) rotate(5deg);}
}
@keyframes popBounce{
  0%{transform:scale(0);}
  60%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

.card-fly-in{animation:cardFlyIn .5s cubic-bezier(.34,1.26,.64,1) both;}
.card-draw-in{animation:cardDrawIn .35s cubic-bezier(.34,1.26,.64,1) both;}
.discard-special-skip .card-img-wrap{animation:skipSpin .6s ease both;}
.discard-special-reverse .card-img-wrap{animation:reversePulse .6s ease both;}
.discard-special-draw .card-img-wrap{animation:draw2Pop .5s ease both;}
.discard-special-wild .card-img-wrap{animation:wildPulse .8s ease both;}
.card-invalid-shake{animation:cardShake .4s ease;}

/* Stack mode indicator */
.stack-mode-bar{
  background:rgba(249,192,35,.12);border:1px solid rgba(249,192,35,.35);
  border-radius:10px;padding:7px 14px;font-size:12px;font-weight:800;
  color:var(--uno-yellow);display:flex;align-items:center;gap:8px;
  animation:fadeIn .3s ease both;
}
.stack-mode-bar i{font-size:10px;}
.stack-count-badge{
  background:var(--uno-yellow);color:#111;border-radius:8px;
  padding:2px 8px;font-size:11px;font-weight:900;
}

/* ── Your hand ── */
.your-hand{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 14px 16px;
  background:linear-gradient(to top,rgba(13,15,26,1) 65%,transparent);
  display:flex;flex-direction:column;align-items:center;gap:8px;z-index:50;
}
.hand-cards{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;max-height:130px;overflow:visible;padding-top:10px;}
.action-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.play-btn{
  background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;
  padding:10px 22px;border-radius:10px;font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 16px rgba(34,197,94,.4);
  display:inline-flex;align-items:center;gap:6px;
}
.play-btn:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(34,197,94,.5);}
.play-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.uno-shout-btn{
  background:linear-gradient(135deg,var(--uno-red),#c0221e);color:#fff;border:none;
  padding:10px 18px;border-radius:10px;font-family:'Fredoka One',cursive;
  font-size:15px;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 16px rgba(232,48,44,.4);letter-spacing:.05em;
}
.uno-shout-btn:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(232,48,44,.6);}
.turn-indicator{
  font-size:11px;font-weight:800;color:rgba(255,255,255,.3);
  letter-spacing:.08em;text-transform:uppercase;
  display:flex;align-items:center;gap:5px;
}
.turn-indicator.is-your-turn{color:var(--uno-yellow);}
.spectator-indicator{
  background:rgba(107,114,128,.15);border:1px solid rgba(107,114,128,.3);
  border-radius:10px;padding:8px 16px;font-size:12px;font-weight:800;
  color:#9ca3af;display:flex;align-items:center;gap:7px;width:100%;max-width:340px;justify-content:center;
}

/* ── Timer bar in hand area ── */
.hand-timer-bar{
  width:100%;max-width:340px;height:4px;
  background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;
  display:none;
}
.hand-timer-bar.visible{display:block;}
.hand-timer-fill{
  height:100%;border-radius:4px;
  background:var(--accent2);
  transition:width .9s linear,background .4s;
}
.hand-timer-fill.warn{background:var(--timer-warn);}
.hand-timer-fill.crit{background:var(--timer-crit);}

/* ── Game log ── */
.game-log{
  width:100%;max-width:420px;background:rgba(0,0,0,.25);
  border:1px solid var(--border);border-radius:12px;padding:11px;
  font-size:12px;color:var(--muted);animation:fadeIn .5s .3s ease both;
}
.log-entry{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.log-entry:last-child{border-bottom:none;color:#9ca3af;}
.log-you{color:#60a5fa;}
.log-warn{color:var(--uno-yellow);}
.log-system{color:#a78bfa;}
.log-ai{color:var(--ai-color);}
.log-timer{color:var(--timer-warn);}
.log-special{color:#f9a8d4;}

.active-color-dot{
  width:14px;height:14px;border-radius:50%;display:inline-block;
  border:2px solid rgba(255,255,255,.3);margin-right:4px;vertical-align:middle;
  box-shadow:0 0 8px currentColor;
}

/* ── IN-GAME CHAT ── */
.chat-panel{
  position:fixed;bottom:0;right:0;width:280px;
  background:rgba(13,15,26,.92);backdrop-filter:blur(16px);
  border-top:1px solid var(--border);border-left:1px solid var(--border);
  border-radius:12px 0 0 0;z-index:60;
  display:flex;flex-direction:column;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:320px;
}
.chat-panel.collapsed{transform:translateY(calc(100% - 38px));}
.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;cursor:pointer;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.chat-title{font-size:12px;font-weight:800;color:#d1d5db;display:flex;align-items:center;gap:6px;}
.chat-toggle{font-size:11px;color:var(--muted);}
.chat-unread{
  background:var(--accent);color:#fff;border-radius:8px;
  font-size:9px;font-weight:900;padding:1px 5px;min-width:16px;text-align:center;
  display:none;
}
.chat-unread.show{display:inline-block;}
.chat-messages{
  flex:1;overflow-y:auto;padding:10px;
  display:flex;flex-direction:column;gap:6px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
.chat-msg{font-size:11px;line-height:1.4;}
.chat-msg-name{font-weight:800;margin-right:4px;}
.chat-msg-name.is-me{color:var(--accent2);}
.chat-msg-text{color:#d1d5db;}
.chat-msg-system{color:var(--muted);font-style:italic;font-size:10px;}
.chat-input-row{
  display:flex;gap:6px;padding:8px 10px;
  border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;
}
.chat-inp{
  flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:7px 10px;color:#fff;font-family:'Nunito',sans-serif;
  font-size:12px;font-weight:700;outline:none;
}
.chat-inp::placeholder{color:rgba(255,255,255,.2);}
.chat-send{
  background:var(--accent);border:none;color:#fff;border-radius:8px;
  padding:7px 11px;font-size:12px;cursor:pointer;transition:all .2s;
}
.chat-send:hover{background:#4752c4;}

/* ═══════════════════════════════
   MODALS
═══════════════════════════════ */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px);
}
.modal-overlay.show{display:flex;}
.color-modal,.modal-box{
  background:var(--surface);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:26px;text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.8);animation:cardReveal .3s cubic-bezier(.34,1.56,.64,1) both;
  max-width:340px;width:90%;
}
.color-modal h3,.modal-box h3{font-family:'Fredoka One',cursive;font-size:21px;color:#fff;margin-bottom:18px;}
.color-picker-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
.color-pick-btn{
  width:78px;height:78px;border-radius:13px;border:3px solid transparent;
  cursor:pointer;transition:all .2s;font-size:22px;display:flex;align-items:center;justify-content:center;
}
.color-pick-btn:hover{transform:scale(1.1);border-color:rgba(255,255,255,.5);}
.cpb-red{background:var(--uno-red);}
.cpb-blue{background:var(--uno-blue);}
.cpb-yellow{background:var(--uno-yellow);}
.cpb-green{background:var(--uno-green);}
.win-modal-content{animation:cardReveal .5s cubic-bezier(.34,1.56,.64,1) both;}
.win-icon{font-size:64px;margin-bottom:12px;display:block;color:var(--uno-yellow);}
.win-subtitle{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:20px;}

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
.toast{
  position:fixed;top:78px;left:50%;transform:translateX(-50%) translateY(-16px);
  background:rgba(0,0,0,.88);border:1px solid rgba(255,255,255,.1);color:#fff;
  padding:11px 22px;border-radius:12px;font-size:14px;font-weight:700;
  z-index:300;opacity:0;transition:all .3s;pointer-events:none;
  backdrop-filter:blur(20px);white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Special card effect overlays */
.effect-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:150;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;
}
.effect-overlay.show{opacity:1;}
.effect-text{
  font-family:'Fredoka One',cursive;font-size:clamp(40px,8vw,90px);
  color:#fff;text-shadow:0 0 60px currentColor;letter-spacing:.04em;
  animation:effectPop .6s cubic-bezier(.34,1.56,.64,1) both;
  pointer-events:none;
}
@keyframes effectPop{
  0%{transform:scale(0) rotate(-15deg);opacity:0;}
  60%{transform:scale(1.15) rotate(4deg);opacity:1;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
.effect-overlay-skip{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(232,48,44,.35) 0%,transparent 70%);}
.effect-overlay-skip .effect-text{color:var(--uno-red);}
.effect-overlay-reverse{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(26,115,232,.35) 0%,transparent 70%);}
.effect-overlay-reverse .effect-text{color:var(--uno-blue);}
.effect-overlay-draw{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(232,48,44,.35) 0%,transparent 70%);}
.effect-overlay-draw .effect-text{color:var(--uno-red);}
.effect-overlay-wild{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(249,192,35,.3) 0%,transparent 70%);}
.effect-overlay-wild .effect-text{
  background:linear-gradient(135deg,#e8302c,#f9c023,#2db552,#1a73e8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.effect-overlay-command{background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(147,51,234,.4) 0%,transparent 70%);}
.effect-overlay-command .effect-text{color:#c084fc;}

/* ═══════════════════════════════
   ANIMATIONS
═══════════════════════════════ */
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes livePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.5}}
@keyframes rippleOut{0%{transform:scale(0);opacity:.6}100%{transform:scale(3);opacity:0}}
@keyframes cardSnap{0%{transform:translateY(-6px) scale(1.04)}60%{transform:translateY(2px) scale(.98)}100%{transform:translateY(0) scale(1)}}
@keyframes shardFloat{0%{transform:translateY(0) rotate(0deg);opacity:.7}50%{transform:translateY(-12px) rotate(180deg);opacity:1}100%{transform:translateY(0) rotate(360deg);opacity:.7}}
.btn-ripple{position:relative;overflow:hidden;}
.btn-ripple::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.3);width:100px;height:100px;margin:-50px;transform:scale(0);pointer-events:none;}
.btn-ripple:active::after{animation:rippleOut .4s ease forwards;}
.card-snap{animation:cardSnap .25s ease both;}
.shard-float{animation:shardFloat 3s ease-in-out infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes cardReveal{from{opacity:0;transform:scale(.85) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes wheelSpin{0%{transform:rotate(0deg) scale(1.04)}50%{transform:rotate(180deg) scale(1.08)}100%{transform:rotate(360deg) scale(1.04)}}
@keyframes cardPlay{0%{transform:translateY(-50px) scale(1.15) rotate(-8deg);opacity:0}100%{transform:translateY(0) scale(1) rotate(0);opacity:1}}
@keyframes cardSlide{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes timerPulse{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 12px rgba(239,68,68,.5)}}
@keyframes aiThink{0%,100%{opacity:.5;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}}
.card-play-anim{animation:cardPlay .4s cubic-bezier(.34,1.56,.64,1) both;}
.card-slide-in{animation:cardSlide .3s ease both;}

/* ═══════════════════════════════
   TRUTH OR DARE
═══════════════════════════════ */
#screen-tod{padding:0;background:transparent;position:relative;overflow:hidden;}
#screen-tod::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:
    radial-gradient(ellipse 70% 50% at 30% 40%,rgba(124,58,237,.11) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 70% 60%,rgba(236,72,153,.07) 0%,transparent 50%);
}
#screen-tod > *{position:relative;z-index:2;}
.tod-arena{width:100%;max-width:680px;margin:0 auto;padding:18px 16px 40px;display:flex;flex-direction:column;align-items:center;gap:22px;}
.tod-players{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;width:100%;animation:fadeDown .4s ease both;}
.tod-player-chip{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:12px;padding:10px 13px;min-width:78px;position:relative;transition:all .3s;
}
.tod-player-chip.spotlight{
  border-color:var(--tod-pink);background:rgba(236,72,153,.1);
  box-shadow:0 0 24px rgba(236,72,153,.3);transform:scale(1.05);
}
.tod-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;}
.tod-pname{font-size:11px;font-weight:800;color:#d1d5db;text-align:center;}
.tod-pscore{font-size:9px;color:var(--muted);font-weight:700;}
.tod-wheel-area{display:flex;flex-direction:column;align-items:center;gap:18px;animation:fadeIn .5s .2s ease both;}
.wheel-ring{
  width:190px;height:190px;border-radius:50%;
  background:conic-gradient(#7c3aed 0deg 180deg,#ec4899 180deg 360deg);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px rgba(124,58,237,.4),0 0 80px rgba(236,72,153,.2);
  cursor:pointer;transition:transform .2s;position:relative;
}
.wheel-ring:hover{transform:scale(1.04);}
.wheel-ring.spinning{animation:wheelSpin .8s ease both;}
.wheel-inner{
  width:112px;height:112px;border-radius:50%;background:#0e0818;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;
}
.wheel-inner i{font-size:26px;color:#a78bfa;}
.wheel-inner span{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#9ca3af;}
.tod-choice-btns{display:flex;gap:13px;flex-wrap:wrap;justify-content:center;}
.tod-btn{padding:13px 28px;border-radius:14px;border:none;font-family:'Fredoka One',cursive;font-size:21px;cursor:pointer;transition:all .2s;letter-spacing:.02em;display:inline-flex;align-items:center;gap:9px;}
.tod-truth-btn{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 6px 24px rgba(124,58,237,.5);}
.tod-truth-btn:hover{transform:scale(1.06);box-shadow:0 8px 32px rgba(124,58,237,.7);}
.tod-dare-btn{background:linear-gradient(135deg,#ec4899,#db2777);color:#fff;box-shadow:0 6px 24px rgba(236,72,153,.5);}
.tod-dare-btn:hover{transform:scale(1.06);box-shadow:0 8px 32px rgba(236,72,153,.7);}
.tod-wild-btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 6px 24px rgba(245,158,11,.5);}
.tod-wild-btn:hover{transform:scale(1.06);box-shadow:0 8px 32px rgba(245,158,11,.7);}
.prompt-card{width:100%;max-width:480px;border-radius:20px;padding:26px;text-align:center;position:relative;overflow:hidden;animation:cardReveal .5s cubic-bezier(.34,1.56,.64,1) both;}
.prompt-card.truth-card{background:linear-gradient(135deg,#1e1040,#2d1b6e);border:1px solid rgba(124,58,237,.5);box-shadow:0 8px 40px rgba(124,58,237,.3);}
.prompt-card.dare-card{background:linear-gradient(135deg,#2d0a1e,#6b1040);border:1px solid rgba(236,72,153,.5);box-shadow:0 8px 40px rgba(236,72,153,.3);}
.prompt-card.wild-card{background:linear-gradient(135deg,#1a1000,#3d2000);border:1px solid rgba(245,158,11,.5);box-shadow:0 8px 40px rgba(245,158,11,.3);}
.prompt-type{font-size:10px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;justify-content:center;gap:6px;}
.truth-card .prompt-type{color:#a78bfa;}
.dare-card .prompt-type{color:#f9a8d4;}
.wild-card .prompt-type{color:var(--uno-yellow);}
.prompt-text{font-family:'Fredoka One',cursive;font-size:clamp(17px,4vw,23px);color:#fff;line-height:1.4;margin-bottom:18px;}
.prompt-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.prompt-action-btn{padding:9px 18px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-complete{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,.4);}
.btn-skip{background:rgba(255,255,255,.07);color:#9ca3af;border:1px solid var(--border);}
.btn-complete:hover{transform:scale(1.04);}
.btn-skip:hover{background:rgba(255,255,255,.12);}
.ai-thinking{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;font-weight:700;padding:20px;}
.ai-thinking-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);animation:dotPulse 1.2s ease infinite;}
.ai-thinking-dots span:nth-child(2){animation-delay:.2s;}
.ai-thinking-dots span:nth-child(3){animation-delay:.4s;}

/* Scoreboard */
.tod-scoreboard{
  width:100%;max-width:400px;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:14px;padding:14px;
}
.tod-scoreboard-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.score-row{
  display:flex;align-items:center;gap:10px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.score-row:last-child{border-bottom:none;}
.score-rank{font-size:11px;font-weight:900;color:var(--muted);min-width:18px;}
.score-rank.rank-1{color:var(--uno-yellow);}
.score-rank.rank-2{color:#9ca3af;}
.score-rank.rank-3{color:#cd7c32;}
.score-name{flex:1;font-size:12px;font-weight:800;}
.score-pts{font-size:12px;font-weight:900;color:var(--accent2);}

@media(max-width:480px){
  .activity-grid{grid-template-columns:1fr;}
  .hand-cards .card-img-wrap img{border-radius:7px;}
  .chat-panel{width:220px;}
  /* Performance: reduce blur on mobile */
  .card-glow{filter:blur(30px)!important;}
  .modal-overlay{backdrop-filter:blur(4px);}
  .browser-topbar,.game-topbar{backdrop-filter:blur(8px);}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important;}
}

/* ═══════════════════════════════
   DISCORD AUTH
═══════════════════════════════ */
.discord-login-bar {
  display:flex;align-items:center;justify-content:center;
  margin-top:14px;gap:10px;flex-wrap:wrap;
}
.discord-login-btn {
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#5865F2,#4752c4);
  border:none;border-radius:12px;padding:9px 18px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  color:#fff;cursor:pointer;transition:all .2s;
  box-shadow:0 4px 14px rgba(88,101,242,.45);letter-spacing:.02em;
}
.discord-login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(88,101,242,.65);}
.discord-login-btn svg{width:16px;height:16px;flex-shrink:0;}
.discord-profile-chip {
  display:none;align-items:center;gap:8px;
  background:rgba(88,101,242,.14);border:1px solid rgba(88,101,242,.3);
  border-radius:12px;padding:7px 13px;cursor:pointer;transition:all .2s;
}
.discord-profile-chip:hover{background:rgba(88,101,242,.22);}
.discord-profile-chip.show{display:flex;}
.dc-avatar {
  width:28px;height:28px;border-radius:50%;
  border:2px solid rgba(88,101,242,.5);object-fit:cover;
  background:rgba(88,101,242,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:#fff;flex-shrink:0;
}
.dc-avatar img{width:28px;height:28px;border-radius:50%;display:block;}
.dc-name{font-size:12px;font-weight:800;color:#a5b4fc;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dc-logout{font-size:10px;color:var(--muted);margin-left:4px;font-weight:700;}
/* Auth modal */
.auth-modal-overlay {
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);
  z-index:450;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
}
.auth-modal-overlay.show{display:flex;}
.auth-box {
  background:var(--surface);border:1px solid rgba(88,101,242,.3);
  border-radius:24px;padding:32px 26px;width:90%;max-width:360px;
  box-shadow:0 24px 80px rgba(0,0,0,.9);animation:cardReveal .35s cubic-bezier(.34,1.56,.64,1) both;
  text-align:center;
}
.auth-box-icon{font-size:48px;margin-bottom:10px;}
.auth-box h3{font-family:'Fredoka One',cursive;font-size:22px;color:#fff;margin-bottom:8px;}
.auth-box p{font-size:13px;color:var(--muted);font-weight:700;line-height:1.5;margin-bottom:20px;}
.auth-feature-list{
  display:flex;flex-direction:column;gap:7px;margin-bottom:22px;text-align:left;
}
.auth-feature{
  display:flex;align-items:center;gap:9px;
  background:rgba(255,255,255,.04);border-radius:10px;padding:8px 12px;
  font-size:12px;font-weight:800;color:#d1d5db;
}
.auth-feature i{font-size:12px;color:var(--accent2);width:14px;text-align:center;}
.auth-loading{
  display:none;flex-direction:column;align-items:center;gap:10px;
  font-size:13px;font-weight:700;color:var(--muted);padding:20px 0;
}
.auth-loading.show{display:flex;}
.auth-spinner{
  width:28px;height:28px;border:3px solid rgba(88,101,242,.2);
  border-top-color:#5865F2;border-radius:50%;
  animation:spin .8s linear infinite;
}

/* ═══════════════════════════════
   STATS / LEADERBOARD / FRIENDS
═══════════════════════════════ */
.big-modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:410;align-items:flex-start;justify-content:center;
  backdrop-filter:blur(12px);overflow-y:auto;padding:24px 12px 60px;
}
.big-modal-overlay.show{display:flex;}
.big-modal-box{
  background:var(--surface);border:1px solid rgba(255,255,255,.1);
  border-radius:24px;padding:0;width:100%;max-width:460px;
  box-shadow:0 24px 80px rgba(0,0,0,.9);animation:cardReveal .35s cubic-bezier(.34,1.56,.64,1) both;
  overflow:hidden;
}
.big-modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
}
.big-modal-title{font-family:'Fredoka One',cursive;font-size:20px;color:#fff;display:flex;align-items:center;gap:9px;}
.big-modal-close{background:rgba(255,255,255,.08);border:none;color:#9ca3af;width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.big-modal-close:hover{background:rgba(255,255,255,.15);color:#fff;}
.big-modal-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);}
.bm-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.bm-tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}
.bm-tab:hover{color:#fff;}
.big-modal-body{padding:18px 18px 22px;}

/* Stats panel */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.stat-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:14px 12px;text-align:center;
}
.stat-card-val{font-family:'Fredoka One',cursive;font-size:28px;color:#fff;line-height:1;}
.stat-card-lbl{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.stat-card.highlight{border-color:rgba(249,192,35,.3);background:rgba(249,192,35,.07);}
.stat-card.highlight .stat-card-val{color:var(--uno-yellow);}
.history-list{display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.history-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:8px 11px;font-size:12px;
}
.history-result{
  font-family:'Fredoka One',cursive;font-size:13px;min-width:38px;text-align:center;
  border-radius:7px;padding:3px 7px;
}
.history-result.win{background:rgba(34,197,94,.18);color:#4ade80;}
.history-result.loss{background:rgba(239,68,68,.18);color:#f87171;}
.history-meta{flex:1;color:#9ca3af;font-weight:700;}
.history-shards{font-family:'Fredoka One',cursive;font-size:12px;color:var(--uno-yellow);}

/* Leaderboard */
.lb-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:12px;transition:background .15s;
}
.lb-row:hover{background:rgba(255,255,255,.04);}
.lb-row.is-me{background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.25);}
.lb-rank{font-family:'Fredoka One',cursive;font-size:16px;min-width:30px;text-align:center;}
.lb-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;}
.lb-avatar img{width:34px;height:34px;border-radius:50%;object-fit:cover;display:block;}
.lb-name{flex:1;font-size:13px;font-weight:800;}
.lb-shards{font-family:'Fredoka One',cursive;font-size:14px;color:var(--uno-yellow);}
.lb-wins{font-size:11px;font-weight:800;color:var(--muted);margin-left:6px;}
.lb-divider{height:1px;background:rgba(255,255,255,.06);margin:4px 0;}
.lb-loading{text-align:center;padding:28px 0;color:var(--muted);font-size:13px;font-weight:700;}

/* Friends */
.friends-search-row{display:flex;gap:8px;margin-bottom:14px;}
.friends-list{display:flex;flex-direction:column;gap:7px;max-height:300px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.friend-row{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:11px;padding:8px 11px;
}
.friend-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;overflow:hidden;
